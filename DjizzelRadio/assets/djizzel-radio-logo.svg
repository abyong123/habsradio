<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
  <title id="title">Djizzel Radio</title>
  <desc id="desc">Horizontaal donkeroranje logo met plaat, koptelefoon, radiosignaal en woordmerk.</desc>
  <defs>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffae50"/>
      <stop offset="0.48" stop-color="#ff7b19"/>
      <stop offset="1" stop-color="#d84c00"/>
    </linearGradient>
    <linearGradient id="orangeText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffa340"/>
      <stop offset="1" stop-color="#ed650b"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="44%" cy="38%" r="70%">
      <stop offset="0" stop-color="#2b2825"/>
      <stop offset="0.55" stop-color="#11100f"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.98  0 0.35 0 0  0 0 0.05 0 0  0 0 0 0.75 0" result="orangeBlur"/>
      <feMerge><feMergeNode in="orangeBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(18 18)">
    <path d="M91 8c46 0 83 37 83 83 0 37-24 68-57 79l-38 26 7-21C42 173 8 137 8 92 8 46 45 8 91 8Z" fill="none" stroke="url(#orange)" stroke-width="7" filter="url(#glow)"/>
    <circle cx="91" cy="91" r="58" fill="url(#vinyl)" stroke="#34302d" stroke-width="2"/>
    <g fill="none" stroke="#514943" stroke-width="1" opacity=".7">
      <circle cx="91" cy="91" r="47"/><circle cx="91" cy="91" r="39"/><circle cx="91" cy="91" r="31"/>
    </g>
    <circle cx="91" cy="91" r="18" fill="url(#orange)"/>
    <circle cx="91" cy="91" r="4" fill="#171310"/>

    <path d="M44 79V66c0-30 21-53 47-53 27 0 48 23 48 53v13" fill="none" stroke="url(#orange)" stroke-width="7" stroke-linecap="round"/>
    <rect x="31" y="69" width="18" height="44" rx="8" fill="#191715" stroke="#ff7d20" stroke-width="4"/>
    <rect x="134" y="69" width="18" height="44" rx="8" fill="#191715" stroke="#ff7d20" stroke-width="4"/>

    <path d="M127 51 110 91" fill="none" stroke="#d8cbc0" stroke-width="4" stroke-linecap="round"/>
    <rect x="105" y="88" width="10" height="16" rx="3" transform="rotate(25 110 96)" fill="url(#orange)"/>

    <g fill="url(#orange)">
      <rect x="66" y="126" width="6" height="15" rx="2"/><rect x="76" y="119" width="6" height="22" rx="2"/>
      <rect x="86" y="111" width="6" height="30" rx="2"/><rect x="96" y="122" width="6" height="19" rx="2"/>
      <rect x="106" y="116" width="6" height="25" rx="2"/>
    </g>

    <g fill="none" stroke="url(#orange)" stroke-width="6" stroke-linecap="round" filter="url(#glow)">
      <path d="M147 32c13 8 22 20 27 34"/>
      <path d="M154 17c22 12 37 31 44 54"/>
    </g>
  </g>

  <g transform="translate(235 0)">
    <text x="0" y="142" fill="url(#orangeText)" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="800" font-style="italic" letter-spacing="-5">Djizzel</text>
    <text x="400" y="142" fill="#ff953e" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="400" font-style="italic" letter-spacing="-3">Radio</text>
    <rect x="18" y="162" width="542" height="3" rx="2" fill="url(#orange)" opacity=".52" filter="url(#glow)"/>
  </g>
</svg>
